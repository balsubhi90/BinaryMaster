<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Master</title>
    <style>
/* تحسين الحاوية الرئيسية */
.game-container {
    max-width: 450px;
    width: 95%;
    margin: 0 auto;
    min-height: 90vh; /* يضمن عدم تشتت العناصر في الشاشات الطويلة */
    display: flex;
    flex-direction: column;
    justify-content: center; /* تجميع العناصر في الوسط */
    gap: 20px;
}

/* تحسين الشعار ليكون بحجم مناسب */
.logo-container img {
    width: 70%; /* حجم أكبر قليلاً */
    max-width: 250px;
    height: auto;
    margin-bottom: 10px;
}

/* حل مشكلة صفوف البت (BITS) */
#bitsGrid {
    display: grid;
    grid-template-columns: repeat(8, 1fr); /* إجبار الـ 8 خانات على البقاء في صف واحد */
    gap: 5px; /* تقليل المسافة لتناسب عرض الشاشة */
    direction: ltr; /* لضمان ترتيب 128 في اليسار و 1 في اليمين */
    width: 100%;
    margin: 20px 0;
}

/* تصغير الأزرار قليلاً لتناسب الشاشات الصغيرة */
.bit-btn {
    width: 40px; 
    height: 40px;
    font-size: 16px;
    border-radius: 8px;
}

/* تحسين لوحة الإدخال والخيارات */
.input-group {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}



        :root { 
            --neon: #00ff41; 
            --bg: #0d0208; 
            --panel: rgba(25, 25, 25, 0.95); 
            --card: rgba(45, 45, 45, 0.7); 
            --error: #ff4444; 
        }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            background-color: var(--bg); 
            color: var(--neon); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            text-align: center; 
        }
        
        .screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            width: 100vw; 
            animation: fadeIn 0.5s; 
            padding: 20px;
        }
        .active-screen { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #homeScreen {
            background-image: url('logo.png');
            background-size: 110vh auto; 
            background-position: center 5%; 
            background-repeat: no-repeat;
            justify-content: flex-end; 
            padding-bottom: 12vh; 
        }

        .home-btns {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            z-index: 10;
        }

        .btn-action { 
            padding: 14px 35px; 
            font-size: 20px; 
            background: rgba(13, 2, 8, 0.9); 
            border: 2px solid var(--neon); 
            color: var(--neon); 
            cursor: pointer; 
            border-radius: 12px; 
            font-weight: bold; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        .btn-action:hover { 
            background: var(--neon); 
            color: var(--bg); 
            box-shadow: 0 0 30px var(--neon); 
            transform: translateY(-3px);
        }

        .game-header { 
            position: fixed; top: 0; left: 0; width: 100vw; 
            height: 75px; background: rgba(0,0,0,0.85); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .small-logo { width: 55px; height: auto; filter: drop-shadow(0 0 8px var(--neon)); }

        .main-wrapper { 
            display: flex; 
            flex-direction: row; 
            width: 100%; 
            max-width: 1300px;
            margin-top: 85px; 
            gap: 25px; 
            height: calc(100vh - 110px);
        }
        
        .sidebar, .game-area { 
            border-radius: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .sidebar { width: 35%; background: var(--card); backdrop-filter: blur(10px); }
        .game-area { width: 65%; background: var(--panel); position: relative; }

        .big-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 255, 65, 0.4); border-radius: 12px; color: #fff; font-size: 20px; padding: 15px; text-align: center; outline: none; width: 100%; }
        .prog-name { font-size: 26px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px var(--neon); }
        .prog-score { font-size: 65px; font-weight: bold; }

        .target-circle { width: 150px; height: 150px; border: 5px solid var(--neon); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--neon); margin-bottom: 30px; background: rgba(0,0,0,0.3); }
        #targetNum { font-size: 55px; font-weight: bold; }
        
        .bits-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .bit-btn { width: 55px; height: 85px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: var(--neon); font-size: 26px; border-radius: 12px; cursor: pointer; }
        .bit-btn.active { background: var(--neon); color: var(--bg); box-shadow: 0 0 20px var(--neon); }

        #timer-wrap { width: 80%; max-width: 400px; height: 10px; background: #000; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        #timer-fill { width: 0%; height: 100%; background: var(--neon); }

        @media (max-width: 900px) {
            #homeScreen { background-size: 100% auto; background-position: center 15%; padding-bottom: 10vh; }
            .main-wrapper { flex-direction: column; height: auto; margin-top: 80px; }
            .sidebar, .game-area { width: 100%; min-height: 350px; }
        }

        .leader-card { width: 100%; max-width: 500px; background: var(--card); padding: 18px; margin: 10px; border-radius: 15px; display: flex; justify-content: space-between; font-size: 24px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:200; align-items:center; justify-content:center; padding: 25px; }
    </style>
</head>
<body>

    <div id="homeScreen" class="screen active-screen">
        <div class="home-btns">
            <button class="btn-action" onclick="switchScreen('playScreen')">ابدأ اللعب</button>
            <button class="btn-action" onclick="document.getElementById('howModal').style.display='flex'">كيف ألعب؟</button>
        </div>
    </div>

    <div id="playScreen" class="screen">
        <div class="game-header">
            <img src="logo.png" alt="Logo" class="small-logo">
            <button class="btn-action" style="border-color:var(--error); color:var(--error); font-size:14px; padding: 6px 20px;" onclick="finalizeGame()">إنهاء التحدي</button>
        </div>

        <div class="main-wrapper">
            <div class="sidebar">
                <div id="inputPanel" style="width:100%">
                    <h2 style="margin-bottom:20px; color:#fff;">دخول النظام</h2>
                    <input type="text" id="playerName" class="big-input" placeholder="اسم المبرمجة..." maxlength="12" onkeydown="if(event.key === 'Enter') confirmAndStart()">
                    <button class="btn-action" style="width:100%; margin-top:15px;" onclick="confirmAndStart()">تأكيد الهوية</button>
                </div>
                <div id="progPanel" style="display:none">
                    <div class="prog-name" id="displayProgName"></div>
                    <div class="prog-score" id="displayProgScore">00</div>
                    <div style="opacity:0.5; font-size:14px; letter-spacing: 2px;">POINTS</div>
                </div>
            </div>

            <div class="game-area">
                <div class="target-circle">
                    <span style="font-size:12px; opacity:0.5;">DECIMAL</span>
                    <div id="targetNum">--</div>
                </div>
                <div id="timer-wrap"><div id="timer-fill"></div></div>
                <div class="bits-grid" id="bitsGrid"></div>
            </div>
        </div>
    </div>

    <div id="leaderboardScreen" class="screen">
        <h1 style="font-size: 45px; margin-bottom:30px; text-shadow: 0 0 20px var(--neon);">قائمة الأبطال 🏆</h1>
        <div id="leaderBoardContent" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button class="btn-action" style="margin-top: 40px;" onclick="location.reload()">العودة للرئيسية</button>
    </div>

    <div id="howModal" class="modal" onclick="this.style.display='none'">
        <div style="background:#111; padding:40px; border:2px solid var(--neon); border-radius:25px; max-width:450px; text-align:right;">
            <h2 style="color:var(--neon);">تعليمات المهمة:</h2>
            <p>• سجلي اسمك لتبدأ المعالجة.</p>
            <p>• حولي الرقم العشري إلى ثنائي بالضغط على القيم الصحيحة.</p>
            <p style="text-align:center; margin-top:30px; font-weight:bold;">(اضغطي للإغلاق)</p>
        </div>
    </div>

<script>
    let currentPlayer = "", currentScore = 0, target = 0, roundsCount = 0;
    let timeLeft = 0, timerInterval = null, usedNumbers = new Set();
    let bits = [0,0,0,0,0,0,0,0];
       const bitValues = [1, 2, 4, 8, 16, 32, 64, 128];
    let hallOfFame = [], isSessionActive = false;

    window.onload = () => renderBits(true);

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function confirmAndStart() {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return;
        currentPlayer = name; currentScore = 0; roundsCount = 0; isSessionActive = true;
        document.getElementById('inputPanel').style.display = 'none';
        document.getElementById('progPanel').style.display = 'block';
        document.getElementById('displayProgName').innerText = "المبرمجة: " + currentPlayer;
        document.getElementById('displayProgScore').innerText = "0";
        startRound();
    }

    function startRound() {
        let min = 1, max = 15;
        if (roundsCount < 2) { min = 1; max = 15; } 
        else if (roundsCount < 5) { min = 16; max = 40; } 
        else if (roundsCount < 8) { min = 41; max = 90; } 
        else { min = 91; max = 255; }

        do { target = Math.floor(Math.random() * (max - min + 1)) + min; } 
        while (usedNumbers.has(target) && usedNumbers.size < 255);
        
        usedNumbers.add(target);
        document.getElementById('targetNum').innerText = target;
        bits = [0,0,0,0,0,0,0,0];
        renderBits(false);
        
        let roundLimit;
        if (roundsCount === 0) roundLimit = 20;
        else if (roundsCount === 1) roundLimit = 15;
        else if (roundsCount === 2) roundLimit = 10;
        else roundLimit = 7; 

        timeLeft = roundLimit;
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            timeLeft -= 0.1; 
            let percentage = (timeLeft / roundLimit) * 100;
            document.getElementById('timer-fill').style.width = percentage + "%";
            
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                saveResult();
                resetForNextPlayer();
            }
        }, 100);
    }

    function renderBits(disabled) {
        const grid = document.getElementById('bitsGrid');
        grid.innerHTML = '';
        bitValues.forEach((val, i) => {
            const unit = document.createElement('div');
            unit.style.display = 'flex'; unit.style.flexDirection = 'column'; unit.style.alignItems = 'center'; unit.style.gap = '8px';
            unit.innerHTML = `<span style="font-size:12px; opacity:0.6; color:#fff;">${val}</span>
                <button class="bit-btn ${bits[i]?'active':''}" ${disabled ? 'disabled' : ''} onclick="toggleBit(${i})">${bits[i]}</button>`;
            grid.appendChild(unit);
        });
    }

    function toggleBit(i) {
        bits[i] = bits[i] === 0 ? 1 : 0;
        renderBits(false);
        if(bits.reduce((a, b, idx) => a + (b * bitValues[idx]), 0) === target) {
            clearInterval(timerInterval);
            currentScore += 10;
            roundsCount++;
            document.getElementById('displayProgScore').innerText = currentScore;
            setTimeout(startRound, 400);
        }
    }

    function saveResult() {
        if(isSessionActive && currentScore > 0) {
            hallOfFame.push({ name: currentPlayer, score: currentScore });
            isSessionActive = false;
        }
    }

    function resetForNextPlayer() {
        document.getElementById('playerName').value = "";
        document.getElementById('progPanel').style.display = 'none';
        document.getElementById('inputPanel').style.display = 'block';
        document.getElementById('targetNum').innerText = "--";
        document.getElementById('timer-fill').style.width = "0%";
        renderBits(true);
    }

    function finalizeGame() {
        clearInterval(timerInterval);
        saveResult();
        const content = document.getElementById('leaderBoardContent');
        content.innerHTML = '';
        hallOfFame.sort((a,b) => b.score - a.score);
        hallOfFame.slice(0, 8).forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'leader-card';
            card.innerHTML = `<span>#${i+1} ${p.name}</span><span>${p.score} pt</span>`;
            content.appendChild(card);
        });
        switchScreen('leaderboardScreen');
    }
</script>
</body>
</html>
